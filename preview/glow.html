<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Glow & Shadow</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 26px 20px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .bx { background: var(--bg1); border: 1px solid var(--bg3); height: 80px; border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
  .n { font-weight: 700; font-size: 12px; }
  .v { font-family: var(--font-mono); font-size: 10px; color: var(--fg3); }
  .g1 { box-shadow: var(--glow-primary); }
  .g2 { box-shadow: var(--glow-secondary); }
  .g3 { box-shadow: var(--glow-accent); }
  .g4 { box-shadow: var(--shadow-primary); }
</style>
</head>
<body>
  <div class="row">
    <div class="bx g1"><div class="n">glow-primary</div><div class="v">0 0 40 indigo/30</div></div>
    <div class="bx g2"><div class="n">glow-secondary</div><div class="v">0 0 40 violet/30</div></div>
    <div class="bx g3"><div class="n">glow-accent</div><div class="v">0 0 40 teal/30</div></div>
    <div class="bx g4"><div class="n">shadow-primary</div><div class="v">0 10 40 -10 indigo/60</div></div>
  </div>
</body>
</html>

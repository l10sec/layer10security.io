<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Badges & Pills</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 20px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg3); width: 100%; margin-bottom: -2px; }
  .pill { display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: 9999px; font-size: 13px; }
  .glass-pill { background: hsl(240 12% 10% / 0.6); backdrop-filter: blur(20px); border: 1px solid hsl(239 84% 67% / 0.3); color: var(--fg3); }
  .dot { width: 8px; height: 8px; border-radius: 9999px; background: var(--violet-500); box-shadow: 0 0 10px var(--violet-500); animation: pg 2s infinite; }
  @keyframes pg { 0%,100%{opacity:1} 50%{opacity:.5} }
  .tag { padding: 4px 12px; border-radius: 9999px; font-size: 12px; font-weight: 500; background: var(--bg2); color: var(--fg3); }
  .kpi { display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px; border-radius: 9999px; background: hsl(239 84% 67% / 0.1); border: 1px solid hsl(239 84% 67% / 0.2); color: var(--indigo-500); font-size: 12px; font-weight: 600; }
</style>
</head>
<body>
  <div class="lbl">PILLS · glass hero pill · tags · branded pill</div>
  <span class="pill glass-pill"><span class="dot"></span> AI Security Engineering</span>
  <span class="tag">Evidence-Based</span>
  <span class="tag">30 Frameworks</span>
  <span class="kpi">🛡 30 Frameworks. One Fix.</span>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors — Surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .sw  { border-radius: 12px; padding: 12px; height: 96px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid hsl(240 10% 22%); }
  .name { font-weight: 700; font-size: 12px; }
  .hex  { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg3); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:#0D0D12"><div class="name">bg0 · page</div><div class="hex">240 15 6</div></div>
    <div class="sw" style="background:#17171C"><div class="name">bg1 · card</div><div class="hex">240 12 10</div></div>
    <div class="sw" style="background:#222228"><div class="name">bg2 · muted</div><div class="hex">240 10 15</div></div>
    <div class="sw" style="background:#2A2A32"><div class="name">bg3 · border</div><div class="hex">240 10 18</div></div>
  </div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; font-family: var(--font-sans); }
  .row { display: flex; align-items: center; gap: 12px; padding: 3px 0; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg3); width: 60px; }
  .bar { background: var(--indigo-500); height: 10px; border-radius: 3px; box-shadow: 0 0 14px hsl(239 84% 67% / 0.35); }
  .px { font-family: var(--font-mono); font-size: 10px; color: var(--fg3); }
</style>
</head>
<body>
  <div class="row"><div class="lbl">space-1</div><div class="bar" style="width:4px"></div><div class="px">4 px</div></div>
  <div class="row"><div class="lbl">space-2</div><div class="bar" style="width:8px"></div><div class="px">8 px</div></div>
  <div class="row"><div class="lbl">space-3</div><div class="bar" style="width:12px"></div><div class="px">12 px</div></div>
  <div class="row"><div class="lbl">space-4</div><div class="bar" style="width:16px"></div><div class="px">16 px</div></div>
  <div class="row"><div class="lbl">space-6</div><div class="bar" style="width:24px"></div><div class="px">24 px · card pad</div></div>
  <div class="row"><div class="lbl">space-8</div><div class="bar" style="width:32px"></div><div class="px">32 px</div></div>
  <div class="row"><div class="lbl">space-12</div><div class="bar" style="width:48px"></div><div class="px">48 px</div></div>
  <div class="row"><div class="lbl">space-24</div><div class="bar" style="width:96px"></div><div class="px">96 px · section py</div></div>
</body>
</html>

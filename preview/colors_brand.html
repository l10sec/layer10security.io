<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors — Brand</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .sw { border-radius: 12px; padding: 14px 14px 12px; height: 90px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid hsl(240 10% 18% / 0.6); }
  .name { font-weight: 700; font-size: 13px; color: #fff; }
  .hex  { font-family: var(--font-mono); font-size: 11px; color: rgba(255,255,255,.8); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:#6366F1"><div class="name">Primary · Indigo</div><div class="hex">#6366F1 · hsl 239 84 67</div></div>
    <div class="sw" style="background:#8B5CF6"><div class="name">Secondary · Violet</div><div class="hex">#8B5CF6 · hsl 263 70 58</div></div>
    <div class="sw" style="background:#2DD4BF"><div class="name" style="color:#0D0D12">Accent · Teal</div><div class="hex" style="color:rgba(13,13,18,.7)">#2DD4BF · hsl 172 66 50</div></div>
  </div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 20px; }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 14px; }
  .tile { width: 56px; height: 56px; border-radius: 14px; background: linear-gradient(135deg, hsl(239 84% 67% / 0.18), hsl(263 70% 58% / 0.18)); display: flex; align-items: center; justify-content: center; }
  .tile svg { width: 24px; height: 24px; color: var(--indigo-500); stroke-width: 1.8; fill: none; stroke: currentColor; stroke-linecap: round; stroke-linejoin: round; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg3); margin-bottom: 10px; }
</style>
</head>
<body>
  <div class="lbl">LUCIDE · stroke 1.8 · 24px · gradient tile · indigo tint</div>
  <div class="grid">
    <div class="tile"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
    <div class="tile"><svg viewBox="0 0 24 24"><path d="M12 2a4 4 0 0 0-4 4v2a4 4 0 0 0-4 4 4 4 0 0 0 4 4v2a4 4 0 0 0 8 0v-2a4 4 0 0 0 4-4 4 4 0 0 0-4-4V6a4 4 0 0 0-4-4z"/></svg></div>
    <div class="tile"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
    <div class="tile"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg></div>
    <div class="tile"><svg viewBox="0 0 24 24"><path d="M1 6l8-4 6 4 8-4v16l-8 4-6-4-8 4z"/><line x1="9" y1="2" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="22"/></svg></div>
    <div class="tile"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><polyline points="9 15 11 17 15 13"/></svg></div>
    <div class="tile"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
  </div>
</body>
</html>

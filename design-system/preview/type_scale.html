<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type — Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px 22px; font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: 60px 1fr 160px; align-items: baseline; gap: 12px; padding: 5px 0; border-bottom: 1px solid hsl(240 10% 18% / 0.4); }
  .row:last-child { border-bottom: 0; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg3); text-transform: uppercase; letter-spacing: 0.08em; }
  .sp  { color: var(--fg1); }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg3); text-align: right; }
</style>
</head>
<body>
  <div class="row"><div class="lbl">H1</div><div class="sp" style="font-size:44px;font-weight:700;letter-spacing:-0.02em;">Verified Remediation</div><div class="meta">44/48 · 700</div></div>
  <div class="row"><div class="lbl">H2</div><div class="sp" style="font-size:32px;font-weight:700;letter-spacing:-0.015em;">Security Leaders</div><div class="meta">32/36 · 700</div></div>
  <div class="row"><div class="lbl">H3</div><div class="sp" style="font-size:20px;font-weight:700;">AI Security Agents</div><div class="meta">20/24 · 700</div></div>
  <div class="row"><div class="lbl">Body</div><div class="sp" style="font-size:16px;color:var(--fg2);">Evidence-based per-control intelligence.</div><div class="meta">16/26 · 400</div></div>
  <div class="row"><div class="lbl">Small</div><div class="sp" style="font-size:12px;color:var(--fg3);">Per-control evidence · Data source attribution</div><div class="meta">12/18 · 400</div></div>
</body>
</html>

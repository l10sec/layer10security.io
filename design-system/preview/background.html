<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Grid Pattern</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 0; height: 150px; background: var(--bg0); position: relative; overflow: hidden; }
  .grid { position: absolute; inset: 0; }
  .grid.o-30 { opacity: 0.3; }
  .blob1 { position: absolute; left: 8%; top: -40px; width: 220px; height: 220px; background: hsl(239 84% 67% / 0.15); border-radius: 999px; filter: blur(60px); }
  .blob2 { position: absolute; right: 6%; bottom: -60px; width: 200px; height: 200px; background: hsl(263 70% 58% / 0.15); border-radius: 999px; filter: blur(60px); }
  .lbl { position: absolute; left: 20px; top: 18px; font-family: var(--font-mono); font-size: 11px; color: var(--fg3); z-index:2;}
  .lbl2 { position: absolute; left: 20px; top: 40px; font-weight: 700; color: #fff; font-size: 16px; z-index:2; }
</style>
</head>
<body>
  <div class="grid grid-pattern o-30"></div>
  <div class="blob1"></div>
  <div class="blob2"></div>
  <div class="lbl">BACKGROUND · grid-pattern 60×60 at opacity 0.3</div>
  <div class="lbl2">+ primary / secondary blur-3xl blobs</div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Glass Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg0) url('') no-repeat; position: relative; overflow: hidden; }
  body::before { content: ""; position: absolute; inset: 0; background-image: linear-gradient(hsl(240 10% 18% / 0.3) 1px, transparent 1px), linear-gradient(90deg, hsl(240 10% 18% / 0.3) 1px, transparent 1px); background-size: 60px 60px; opacity: 0.2; }
  body::after { content: ""; position: absolute; left: -40px; top: -40px; width: 220px; height: 220px; background: hsl(239 84% 67% / 0.12); border-radius: 999px; filter: blur(60px); }
  .card { position: relative; background: hsl(240 12% 10% / 0.6); backdrop-filter: blur(20px); border: 1px solid hsl(240 10% 18% / 0.5); border-radius: 20px; padding: 20px; max-width: 620px; }
  .ico { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg, hsl(239 84% 67% / 0.2), hsl(263 70% 58% / 0.2)); display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
  .ico svg { width: 22px; height: 22px; color: var(--indigo-500); }
  h3 { font-size: 18px; font-weight: 700; margin: 0 0 6px; }
  p { font-size: 13px; color: var(--fg3); margin: 0 0 10px; line-height: 1.55; }
  .hl { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 6px; }
  .hl li { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--fg3); }
  .hl li::before { content: ""; width: 6px; height: 6px; border-radius: 999px; background: var(--violet-500); }
  .under { position: absolute; left: 0; right: 0; bottom: 0; height: 2px; background: var(--gradient-primary); border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; transform-origin: left; }
</style>
</head>
<body>
  <div class="card">
    <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a9 9 0 1 0 9 9"/><path d="M21 12a9 9 0 0 0-9-9"/><circle cx="12" cy="12" r="3"/></svg></div>
    <h3>AI Security Agents</h3>
    <p>Intelligent agents that query your security tools, identify missing or misconfigured controls, and propose remediation — grounded in live data, not assumptions.</p>
    <ul class="hl"><li>Evidence-based</li><li>Per-control intelligence</li><li>Human-approved remediation</li></ul>
    <div class="under"></div>
  </div>
</body>
</html>

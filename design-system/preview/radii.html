<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .bx { background: var(--bg1); border: 1px solid var(--bg3); height: 92px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
  .v { font-family: var(--font-mono); font-size: 11px; color: var(--fg3); }
  .n { font-weight: 700; font-size: 12px; }
</style>
</head>
<body>
  <div class="row">
    <div class="bx" style="border-radius:8px"><div class="n">sm</div><div class="v">8px</div></div>
    <div class="bx" style="border-radius:12px"><div class="n">md</div><div class="v">12px</div></div>
    <div class="bx" style="border-radius:16px"><div class="n">lg · card</div><div class="v">16px</div></div>
    <div class="bx" style="border-radius:24px"><div class="n">xl · glass</div><div class="v">24px</div></div>
    <div class="bx" style="border-radius:9999px"><div class="n">full · pill</div><div class="v">9999px</div></div>
  </div>
</body>
</html>

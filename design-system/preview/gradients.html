<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Gradients</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .bx { height: 96px; border-radius: 14px; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid hsl(240 10% 22%); }
  .name { font-weight: 700; font-size: 12px; color: #fff; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: rgba(255,255,255,.85); }
  .hero { background: var(--gradient-hero); }
  .primary { background: var(--gradient-primary); }
  .textg { background: var(--gradient-text); }
</style>
</head>
<body>
  <div class="row">
    <div class="bx hero"><div class="name">gradient-hero</div><div class="meta">bg0 → bg1 → bg0 · 135°</div></div>
    <div class="bx primary"><div class="name">gradient-primary</div><div class="meta">indigo → violet · 135°</div></div>
    <div class="bx textg"><div class="name" style="color:#0D0D12">gradient-text</div><div class="meta" style="color:rgba(13,13,18,.7)">teal → teal-light · 135°</div></div>
  </div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type — Mono & Eyebrow</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 22px; }
  .block { display:flex; flex-direction: column; gap: 14px; }

  .row { display: flex; align-items: center; gap: 18px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg3); }
</style>
</head>
<body>
  <div class="block">
    <div><div class="eb">Capabilities</div><div class="meta">Eyebrow · Space Grotesk 600 · 14px · tracking 0.08em · indigo</div></div>
    <div class="row"><div class="num">01</div><div><div class="mono">3,400+ Control Mappings</div><div class="meta">Mono · JetBrains Mono 500/700 · numbers, step badges, code</div></div></div>
